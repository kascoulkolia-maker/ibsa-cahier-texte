<title>Espace Parents — IBSA</title>

<style>
:root {
  --primary: #0D2B55;
  --primary-light: #1A4480;
  --accent: #D4930A;
  --accent-light: #F0B429;
  --success: #166534;
  --bg: #F1F5FB;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --text: #0F172A;
  --text-muted: #475569;
  --shadow: 0 4px 20px rgba(13,43,85,0.10);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #2a5a8c 100%);
  padding: 24px 20px;
  text-align: center;
  color: white;
}
.header-logo {
  width: 80px; height: 80px; border-radius: 50%;
  border: 3px solid var(--accent); object-fit: contain;
  background: white; padding: 6px;
  box-shadow: 0 0 0 3px white, 0 0 0 5px var(--accent);
  margin-bottom: 14px;
}
.header h1 { font-family: 'Playfair Display', serif; font-size: 20px; line-height: 1.3; }
.header .classe-badge {
  display: inline-block; margin-top: 10px;
  background: rgba(212,147,10,0.25); border: 1px solid var(--accent);
  color: var(--accent-light); padding: 5px 18px; border-radius: 20px;
  font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
}
.header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }

/* CONTAINER */
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

/* ÉTAT VIDE / LOADING */
.state-box {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted); font-size: 15px;
}
.state-box .icon { font-size: 48px; margin-bottom: 14px; }
.state-box h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-family: 'Playfair Display', serif; }

/* SÉANCE CARD */
.seance-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.seance-header {
  background: linear-gradient(135deg, #0D2B55 0%, #1B3D6F 100%);
  color: white;
  padding: 12px 16px;
  display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 6px;
}
.seance-header .matiere {
  font-weight: 700; font-size: 15px;
}
.seance-header .meta {
  font-size: 12px; opacity: 0.8; margin-top: 2px;
}
.seance-header .type-badge {
  font-size: 11px; background: rgba(212,147,10,0.3); border: 1px solid var(--accent-light);
  color: var(--accent-light); padding: 2px 10px; border-radius: 20px; white-space: nowrap;
}
.seance-body { padding: 14px 16px; }
.seance-field { font-size: 13px; margin-bottom: 8px; line-height: 1.5; }
.seance-field strong { color: var(--primary); }
.seance-field.chapitre {
  font-weight: 700; font-size: 14px; color: var(--primary);
  padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.seance-field.travail {
  background: rgba(212,147,10,0.07); padding: 8px 12px;
  border-radius: 8px; border-left: 3px solid var(--accent);
}
.seance-field.observations { color: var(--text-muted); font-size: 12px; }

/* FICHIERS JOINTS */
.files-section {
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.files-title {
  font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px;
}
.file-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(26,58,92,0.04); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
}
.file-icon { font-size: 22px; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-weight: 600; font-size: 13px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.btn-download {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border: none; border-radius: 8px;
  background: var(--primary); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
}
.btn-download:hover { background: var(--primary-light); }
.btn-download:active { transform: scale(0.97); }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--primary); color: white;
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.3s; z-index: 999;
  max-width: 300px;
}
.toast.show { opacity: 1; }

/* FOOTER */
.footer {
  text-align: center; padding: 20px;
  font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--border); background: white;
  position: fixed; bottom: 0; width: 100%;
}

@media(max-width:480px){
  .seance-header { flex-direction: column; }
  .file-row { flex-wrap: wrap; }
}

/* ── Footer chaud ── */

/* ── SVG icons ── */
.ibsa-icon { display: inline-block; vertical-align: -2px; width: 14px; height: 14px; flex-shrink: 0; }

.icon-replaced { display: contents; }
</style>

<body>

<div class="header">
  <img src="./logo.png" alt="IBSA" class="header-logo" onerror="this.style.display='none'">
  <h1>International Bilingual School of Africa</h1>
  <div class="classe-badge" id="classe-badge">—</div>
  <p>Cahier de texte numérique — Espace Parents</p>
</div>

<div class="container" id="container">
  <div class="state-box">
    <div class="icon">⏳</div>
    <h3>Chargement en cours…</h3>
    <p>Veuillez patienter quelques instants.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">IBSA &copy; 2026 — Espace réservé aux parents d'élèves</div>

<script>
// ─── Paramètre URL ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const CLASSE = (params.get('classe') || '').trim();

document.getElementById('classe-badge').textContent = CLASSE || 'Classe inconnue';
document.title = CLASSE ? `Séances – ${CLASSE} — IBSA` : 'Espace Parents — IBSA';

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Utilitaires ─────────────────────────────────────────────────────────────
function fileIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  const map = { pdf:'📕', doc:'📝', docx:'📝', xls:'📗', xlsx:'📗', ppt:'📙', pptx:'📙', jpg:'🖼️', jpeg:'🖼️', png:'🖼️', mp4:'🎬', mp3:'🎵' };
  return map[ext] || '📄';
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' Ko';
  return (bytes / (1024 * 1024)).toFixed(1) + ' Mo';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Construction URL publique depuis un chemin de stockage ──────────────────
function buildPublicUrl(f) {
  // Priorité : url déjà stockée lors de l'upload
  if (f.url && f.url.startsWith('http')) return f.url;
  // Fallback : reconstruire depuis le chemin et la config Supabase
  if (f.path && window.IBSA_CONFIG && window.IBSA_CONFIG.SUPABASE_URL) {
    return window.IBSA_CONFIG.SUPABASE_URL + '/storage/v1/object/public/seances-files/' + f.path;
  }
  return '';
}

// ─── Téléchargement ───────────────────────────────────────────────────────────
async function downloadFile(url, name) {
  if (!url || url === 'undefined') {
    showToast('⚠️ Lien du fichier indisponible.');
    return;
  }
  showToast('⬇️ Téléchargement de ' + name + '…');
  try {
    const resp = await fetch(url);
    if (!resp.ok) {
      // Le bucket est peut-être privé : ouvrir directement dans le navigateur
      window.open(url, '_blank');
      return;
    }
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 200);
    showToast('✅ Téléchargement terminé !');
  } catch (e) {
    // Erreur réseau ou CORS : ouvrir dans un nouvel onglet en fallback
    window.open(url, '_blank');
  }
}

// ─── Rendu des séances ────────────────────────────────────────────────────────
function renderSeances(seances) {
  const container = document.getElementById('container');

  if (!seances || seances.length === 0) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">📭</div>
        <h3>Aucune séance disponible</h3>
        <p>Les enseignants n'ont pas encore enregistré de séances pour la classe <strong>${escHtml(CLASSE)}</strong>.</p>
        <p style="font-size:12px;margin-top:10px;color:var(--text-muted)">Si vous pensez qu'il y a une erreur, contactez l'école.</p>
      </div>`;
    return;
  }

  let html = `<p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
    📋 <strong>${seances.length}</strong> séance${seances.length > 1 ? 's' : ''} enregistrée${seances.length > 1 ? 's' : ''} pour la classe <strong>${escHtml(CLASSE)}</strong>
  </p>`;

  seances.forEach(s => {

    // Fichiers joints
    const files = Array.isArray(s.files) ? s.files.filter(f => f.url || f.path) : [];
    let filesHtml = '';
    if (files.length > 0) {
      filesHtml = `<div class="files-section">
        <div class="files-title">📎 ${files.length} pièce(s) jointe(s)</div>`;
      files.forEach(f => {
        const accessUrl = buildPublicUrl(f);
        const fname = f.name || 'fichier';
        filesHtml += `<div class="file-row">
          <span class="file-icon">${fileIcon(fname)}</span>
          <div class="file-info">
            <div class="file-name" title="${escHtml(fname)}">${escHtml(fname)}</div>
            <div class="file-meta">${formatSize(f.size)}${f.type ? ' · ' + f.type.split('/').pop().toUpperCase() : ''}</div>
          </div>
          ${accessUrl
            ? `<button class="btn-download" onclick="downloadFile('${accessUrl.replace(/'/g,"\\'")}','${fname.replace(/'/g,"\\'")}')">⬇️ Télécharger</button>`
            : `<span style="font-size:11px;color:#999;font-style:italic">Lien indisponible</span>`
          }
        </div>`;
      });
      filesHtml += `</div>`;
    }

    html += `<div class="seance-card">
      <div class="seance-header">
        <div>
          <div class="matiere">📚 ${escHtml(s.matiere)}</div>
          <div class="meta">📅 ${formatDate(s.date)}${s.heure_debut ? ' à ' + escHtml(s.heure_debut) : ''}${s.heure_fin ? ' – ' + escHtml(s.heure_fin) : ''}</div>
        </div>
      </div>
      <div class="seance-body">
        ${s.chapitre ? `<div class="seance-field chapitre">📖 ${escHtml(s.chapitre)}</div>` : ''}
        ${s.contenu ? `<div class="seance-field"><strong>📝 Résumé du cours :</strong><br><span style="color:var(--text-muted)">${escHtml(s.contenu)}</span></div>` : ''}
        ${s.devoirs ? `<div class="seance-field travail"><strong>✏️ Travail à faire :</strong> ${escHtml(s.devoirs)}</div>` : ''}
        ${filesHtml}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// ─── Chargement Supabase ──────────────────────────────────────────────────────
async function loadSeances() {
  const container = document.getElementById('container');

  if (!CLASSE) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <h3>Classe non spécifiée</h3>
        <p>Ce QR code semble incorrect. Veuillez contacter l'école.</p>
      </div>`;
    return;
  }

  const cfg = window.IBSA_CONFIG;
  if (!cfg || !cfg.SUPABASE_URL || !cfg.SUPABASE_KEY) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">⚙️</div>
        <h3>Configuration manquante</h3>
        <p>Impossible de se connecter au serveur. Veuillez contacter l'école.</p>
      </div>`;
    return;
  }

  try {
    const supa = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY);

    const { data, error } = await supa
      .from('seances_parents')
      .select('date, classe, matiere, chapitre, contenu, devoirs, heure_debut, heure_fin, files')
      .eq('classe', CLASSE)
      .order('date', { ascending: false });

    if (error) throw error;

    const seances = (data || []).map(s => ({
      ...s,
      files: Array.isArray(s.files) ? s.files : []
    }));

    renderSeances(seances);

  } catch (e) {
    console.error('[Parents] Erreur chargement :', e);
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">❌</div>
        <h3>Erreur de chargement</h3>
        <p>Impossible de récupérer les séances. Veuillez réessayer ou contacter l'école.</p>
        <p style="font-size:11px;margin-top:8px;color:var(--text-muted)">${escHtml(e.message || '')}</p>
      </div>`;
  }
}

// ─── Démarrage ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadSeances);
</script>

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function processTextNode(node) {
    var text = node.textContent;
    var parts = [text], changed = false;
    var emoji, newParts, i, j, p, segs;
    for (emoji in M) {
      newParts = [];
      for (i = 0; i < parts.length; i++) {
        p = parts[i];
        if (typeof p === 'string' && p.indexOf(emoji) !== -1) {
          segs = p.split(emoji);
          for (j = 0; j < segs.length; j++) {
            newParts.push(segs[j]);
            if (j < segs.length - 1) newParts.push({ h: M[emoji] });
          }
          changed = true;
        } else { newParts.push(p); }
      }
      parts = newParts;
    }
    if (!changed) return;
    var html = parts.map(function(p) { return typeof p === 'string' ? esc(p) : p.h; }).join('');
    var span = document.createElement('span');
    span.className = 'icon-replaced';
    span.innerHTML = html;
    if (node.parentNode) node.parentNode.replaceChild(span, node);
  }

  var DONE = typeof WeakSet !== 'undefined' ? new WeakSet() : null;

  function scanEl(el) {
    var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
    var nodes = [], n;
    while ((n = walker.nextNode())) {
      if (!DONE || !DONE.has(n)) nodes.push(n);
    }
    nodes.forEach(function(node) {
      if (DONE) DONE.add(node);
      processTextNode(node);
    });
  }

  function run() {
    document.querySelectorAll('.seance-header,.seance-body,.state-box,.files-section,.btn-download,.toast,.header').forEach(scanEl);
  }

  var sch = false;
  function schedule() {
    if (sch) return; sch = true;
    setTimeout(function() { run(); sch = false; }, 90);
  }

  if (document.readyState !== 'loading') { run(); }
  else { document.addEventListener('DOMContentLoaded', run); }

  document.addEventListener('DOMContentLoaded', function() {
    new MutationObserver(function(muts) {
      if (muts.some(function(m) { return m.addedNodes.length > 0; })) schedule();
    }).observe(document.body, { childList: true, subtree: true });
  });
}());
